version: 2

models:
  - name: dim_taxi_zones_v1
    description: Canonical TLC taxi zone lookup with borough and airport enrichment.
    columns:
      - name: location_id
        tests:
          - not_null
          - unique
      - name: borough
        tests:
          - not_null
      - name: zone_name
        tests:
          - not_null
      - name: service_zone
        tests:
          - not_null
      - name: is_airport_zone
        tests:
          - not_null
      - name: is_mapped_zone
        tests:
          - not_null

  - name: yellow_tripdata_silver
    description: Canonical Silver model for Yellow TLC trips with operational enrichments and DQ flags.
    columns:
      - name: service_type
        tests:
          - accepted_values:
              values: ['yellow']
      - name: source_year
        tests:
          - not_null
      - name: source_month
        tests:
          - not_null
      - name: dataset_month
        tests:
          - not_null
      - name: pickup_ts
        tests:
          - not_null
      - name: pu_location_id
        tests:
          - relationships:
              to: ref('dim_taxi_zones_v1')
              field: location_id
      - name: do_location_id
        tests:
          - relationships:
              to: ref('dim_taxi_zones_v1')
              field: location_id
      - name: pickup_date
        tests:
          - not_null
      - name: season_name
        tests:
          - accepted_values:
              values: ['winter', 'spring', 'summer', 'fall']
      - name: is_valid_trip
        tests:
          - not_null
      - name: dq_warning_count
        tests:
          - not_null

  - name: green_tripdata_silver
    description: Canonical Silver model for Green TLC trips with operational enrichments and DQ flags.
    columns:
      - name: service_type
        tests:
          - accepted_values:
              values: ['green']
      - name: source_year
        tests:
          - not_null
      - name: source_month
        tests:
          - not_null
      - name: dataset_month
        tests:
          - not_null
      - name: pickup_ts
        tests:
          - not_null
      - name: pu_location_id
        tests:
          - relationships:
              to: ref('dim_taxi_zones_v1')
              field: location_id
      - name: do_location_id
        tests:
          - relationships:
              to: ref('dim_taxi_zones_v1')
              field: location_id
      - name: pickup_date
        tests:
          - not_null
      - name: season_name
        tests:
          - accepted_values:
              values: ['winter', 'spring', 'summer', 'fall']
      - name: is_valid_trip
        tests:
          - not_null
      - name: dq_warning_count
        tests:
          - not_null
