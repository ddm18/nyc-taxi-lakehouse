version: 2

models:
  - name: yellow_trips_v1
    description: Canonical Gold contract for NYC TLC Yellow Taxi trip data.
    config:
      materialized: table
      contract:
        enforced: true
      meta:
        layer: gold
        domain: nyc_taxi
        dataset: yellow_trips
        status: draft
        owners:
          - data_engineering
        grain: one row per taxi trip
        source:
          publisher: NYC TLC
          source_dataset: yellow
    columns:
      - name: vendor_id
        data_type: bigint
      - name: pickup_ts
        data_type: timestamp
        tests:
          - not_null
      - name: dropoff_ts
        data_type: timestamp
      - name: passenger_count
        data_type: double
      - name: trip_distance
        data_type: double
      - name: rate_code_id
        data_type: double
      - name: store_and_fwd_flag
        data_type: string
      - name: pu_location_id
        data_type: bigint
      - name: do_location_id
        data_type: bigint
      - name: payment_type
        data_type: bigint
      - name: fare_amount
        data_type: double
      - name: extra
        data_type: double
      - name: mta_tax
        data_type: double
      - name: tip_amount
        data_type: double
      - name: tolls_amount
        data_type: double
      - name: improvement_surcharge
        data_type: double
      - name: total_amount
        data_type: double
      - name: congestion_surcharge
        data_type: double
      - name: airport_fee
        data_type: double
      - name: pickup_year
        data_type: int
        tests:
          - not_null
      - name: pickup_month
        data_type: int
        tests:
          - not_null
      - name: pickup_date
        data_type: date
        tests:
          - not_null
      - name: dow
        data_type: int
        tests:
          - not_null
      - name: is_weekend
        data_type: boolean
        tests:
          - not_null

