        data_type: timestamp
        tests:
          - not_null
      - name: dropoff_ts
        data_type: timestamp
      - name: store_and_fwd_flag
        data_type: string
      - name: rate_code_id
        data_type: double
      - name: pu_location_id
        data_type: bigint
      - name: do_location_id
        data_type: bigint
      - name: passenger_count
        data_type: double
      - name: trip_distance
        data_type: double
      - name: fare_amount
        data_type: double
      - name: extra
        data_type: double
      - name: mta_tax
        data_type: double
      - name: tip_amount
        data_type: double
      - name: tolls_amount
        data_type: double
      - name: ehail_fee
        data_type: double
      - name: improvement_surcharge
        data_type: double
      - name: total_amount
        data_type: double
      - name: payment_type
        data_type: double
      - name: trip_type
        data_type: double
      - name: congestion_surcharge
        data_type: double
      - name: pickup_year
        data_type: int
        tests:
