version: 2

models:
  - name: yellow_trips_v1
    description: Canonical Gold contract for NYC TLC Yellow Taxi trip data enriched for operational analysis.
    config:
      materialized: table
      contract:
        enforced: true
      meta:
        layer: gold
        domain: nyc_taxi
        dataset: yellow_trips
        status: active
        owners:
          - data_engineering
        grain: one row per taxi trip
        source:
          publisher: NYC TLC
          source_dataset: yellow
    columns:
      - name: service_type
        data_type: string
        tests:
          - accepted_values:
              values: ['yellow']
      - name: source_year
        data_type: int
      - name: source_month
        data_type: int
      - name: dataset_month
        data_type: string
      - name: source_file
        data_type: string
      - name: ingested_at
        data_type: timestamp
      - name: vendor_id
        data_type: bigint
      - name: pickup_ts
        data_type: timestamp
        tests:
          - not_null
      - name: dropoff_ts
        data_type: timestamp
      - name: passenger_count
        data_type: double
      - name: trip_distance
        data_type: double
      - name: rate_code_id
        data_type: double
      - name: store_and_fwd_flag
        data_type: string
      - name: pu_location_id
        data_type: bigint
        tests:
          - relationships:
              to: ref('dim_taxi_zones_v1')
              field: location_id
      - name: do_location_id
        data_type: bigint
        tests:
          - relationships:
              to: ref('dim_taxi_zones_v1')
              field: location_id
      - name: pu_zone_name
        data_type: string
      - name: do_zone_name
        data_type: string
      - name: pu_borough
        data_type: string
      - name: do_borough
        data_type: string
      - name: pu_service_zone
        data_type: string
      - name: do_service_zone
        data_type: string
      - name: pu_is_airport_zone
        data_type: boolean
      - name: do_is_airport_zone
        data_type: boolean
      - name: has_unmapped_pu_zone
        data_type: boolean
      - name: has_unmapped_do_zone
        data_type: boolean
      - name: payment_type
        data_type: bigint
      - name: fare_amount
        data_type: double
      - name: extra
        data_type: double
      - name: mta_tax
        data_type: double
      - name: tip_amount
        data_type: double
      - name: tolls_amount
        data_type: double
      - name: improvement_surcharge
        data_type: double
      - name: total_amount
        data_type: double
      - name: congestion_surcharge
        data_type: double
      - name: airport_fee
        data_type: double
      - name: pickup_year
        data_type: int
        tests:
          - not_null
      - name: pickup_month
        data_type: int
        tests:
          - not_null
      - name: pickup_date
        data_type: date
        tests:
          - not_null
      - name: pickup_hour
        data_type: int
      - name: pickup_week
        data_type: int
      - name: pickup_quarter
        data_type: int
      - name: season_name
        data_type: string
      - name: dow
        data_type: int
        tests:
          - not_null
      - name: is_weekend
        data_type: boolean
        tests:
          - not_null
      - name: day_part
        data_type: string
      - name: is_peak_commute
        data_type: boolean
      - name: trip_duration_minutes
        data_type: double
      - name: avg_speed_mph
        data_type: double
      - name: fare_per_mile
        data_type: double
      - name: tip_pct
        data_type: double
      - name: has_airport_fee
        data_type: boolean
      - name: has_congestion_surcharge
        data_type: boolean
      - name: is_airport_trip
        data_type: boolean
      - name: is_intra_borough_trip
        data_type: boolean
      - name: is_inter_borough_trip
        data_type: boolean
      - name: is_zero_tip
        data_type: boolean
      - name: is_zero_distance
        data_type: boolean
      - name: has_implausible_fare
        data_type: boolean
      - name: is_valid_duration
        data_type: boolean
      - name: is_valid_distance
        data_type: boolean
      - name: is_valid_total_amount
        data_type: boolean
      - name: is_outlier_trip_duration
        data_type: boolean
      - name: is_outlier_trip_distance
        data_type: boolean
      - name: is_outlier_total_amount
        data_type: boolean
      - name: is_valid_trip
        data_type: boolean
        tests:
          - not_null
      - name: dq_warning_count
        data_type: int
        tests:
          - not_null

